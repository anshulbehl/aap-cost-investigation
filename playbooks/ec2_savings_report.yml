---
- name: EC2 Cost Savings Report
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    aws_region: "{{ region | default(config.aws.region | default('us-east-1')) }}"
    hours_per_month: "{{ config.pricing.hours_per_month | default(730) }}"
    pricing: "{{ pricing_data.hourly_rates | default({}) }}"
    downsize_map: "{{ pricing_data.downsize_map | default({}) }}"

  tasks:
    - name: Load configuration defaults
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../config/defaults.yml"
        name: config

    - name: Verify configuration loaded
      ansible.builtin.assert:
        that:
          - config is defined
          - config.aws is defined
        fail_msg: >
          Configuration file not found. Ensure the project root contains config/defaults.yml.

    - name: Load pricing data
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../config/{{ config.pricing.file | default('pricing-us-east-1.yml') }}"
        name: pricing_data
      ignore_errors: true
      register: pricing_load_result

    - name: Warn if pricing file not found
      ansible.builtin.debug:
        msg: >
          Pricing file not found. Instance costs will show as $0.
      when: pricing_load_result is failed

    - name: Gather running EC2 instances
      amazon.aws.ec2_instance_info:
        region: "{{ aws_region }}"
        filters:
          instance-state-name: running
      register: running_instances

    - name: Gather stopped EC2 instances
      amazon.aws.ec2_instance_info:
        region: "{{ aws_region }}"
        filters:
          instance-state-name: stopped
      register: stopped_instances

    - name: Calculate current monthly spend for running instances
      ansible.builtin.set_fact:
        running_costs: >-
          {{
            running_costs | default([]) + [{
              'instance_id': item.instance_id,
              'instance_type': item.instance_type,
              'name': item.tags.Name | default('UNTAGGED'),
              'hourly_cost': pricing[item.instance_type] | default(0),
              'monthly_cost': (pricing[item.instance_type] | default(0)) * hours_per_month,
              'downsize_to': downsize_map[item.instance_type] | default('N/A'),
              'downsize_savings': ((pricing[item.instance_type] | default(0)) - (pricing[downsize_map[item.instance_type] | default(item.instance_type)] | default(0))) * hours_per_month
            }]
          }}
      loop: "{{ running_instances.instances }}"
      loop_control:
        label: "{{ item.instance_id }} ({{ item.instance_type }})"

    - name: Calculate total current spend
      ansible.builtin.set_fact:
        total_monthly_spend: "{{ running_costs | map(attribute='monthly_cost') | sum | round(2) }}"
        total_rightsizing_savings: "{{ running_costs | map(attribute='downsize_savings') | sum | round(2) }}"

    - name: Display cost summary
      ansible.builtin.debug:
        msg:
          region: "{{ aws_region }}"
          running_instances: "{{ running_instances.instances | length }}"
          stopped_instances: "{{ stopped_instances.instances | length }}"
          estimated_monthly_spend: "${{ total_monthly_spend }}"
          potential_rightsizing_savings: "${{ total_rightsizing_savings }}"
          stopped_instance_ebs_waste: "Check EBS volumes attached to {{ stopped_instances.instances | length }} stopped instances"

    - name: Display top cost drivers
      ansible.builtin.debug:
        msg:
          instance_id: "{{ item.instance_id }}"
          name: "{{ item.name }}"
          type: "{{ item.instance_type }}"
          monthly_cost: "${{ '%0.2f' | format(item.monthly_cost) }}"
          rightsizing_option: "{{ item.downsize_to }}"
          potential_monthly_savings: "${{ '%0.2f' | format(item.downsize_savings) }}"
      loop: "{{ running_costs | sort(attribute='monthly_cost', reverse=true) }}"
      loop_control:
        label: "{{ item.instance_id }} (${{ '%0.2f' | format(item.monthly_cost) }}/mo)"

    - name: Set stats for workflow artifact passing
      ansible.builtin.set_stats:
        data:
          ec2_monthly_spend: "{{ total_monthly_spend }}"
          ec2_rightsizing_savings: "{{ total_rightsizing_savings }}"
          ec2_cost_details: "{{ running_costs }}"
          ec2_stopped_count: "{{ stopped_instances.instances | length }}"
