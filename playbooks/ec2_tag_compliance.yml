---
- name: EC2 Tag Compliance Report
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    aws_region: "{{ region | default(config.aws.region | default('us-east-1')) }}"

  tasks:
    - name: Load configuration defaults
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../config/defaults.yml"
        name: config

    - name: Verify configuration loaded
      ansible.builtin.assert:
        that:
          - config is defined
          - config.aws is defined
          - config.aws.region is defined
        fail_msg: >
          Configuration file not found. Ensure the project root contains config/defaults.yml.

    - name: Set effective tag variables
      ansible.builtin.set_fact:
        effective_required_tags: "{{ required_tags | default(config.tags.required | default(['Name', 'Environment', 'Owner', 'CostCenter'])) }}"
        effective_tag_aliases: "{{ tag_aliases | default(config.tags.aliases | default({})) }}"

    - name: Gather all EC2 instances
      amazon.aws.ec2_instance_info:
        region: "{{ aws_region }}"
      register: ec2_instances

    - name: Check tag compliance for each instance
      ansible.builtin.set_fact:
        compliance_results: >-
          {{
            compliance_results | default([]) + [{
              'instance_id': item.instance_id,
              'instance_type': item.instance_type,
              'state': item.state.name,
              'name': item.tags.Name | default(item.tags.name | default('UNTAGGED')),
              'existing_tags': instance_tag_keys,
              'missing_tags': missing,
              'compliant': missing | length == 0
            }]
          }}
      vars:
        instance_tag_keys: "{{ item.tags | default({}) | dict2items | map(attribute='key') | list }}"
        missing: >-
          {% set result = [] %}
          {% for tag in effective_required_tags %}
          {%   set alias = effective_tag_aliases[tag] | default(tag) %}
          {%   if tag not in instance_tag_keys and alias not in instance_tag_keys %}
          {%     set _ = result.append(tag) %}
          {%   endif %}
          {% endfor %}
          {{ result }}
      loop: "{{ ec2_instances.instances }}"
      loop_control:
        label: "{{ item.instance_id }}"

    - name: Display compliance summary
      ansible.builtin.debug:
        msg:
          total_instances: "{{ compliance_results | length }}"
          compliant: "{{ compliance_results | selectattr('compliant') | list | length }}"
          non_compliant: "{{ compliance_results | rejectattr('compliant') | list | length }}"
          compliance_rate: "{{ '%0.1f' | format((compliance_results | selectattr('compliant') | list | length) / (compliance_results | length) * 100) }}%"
          required_tags: "{{ effective_required_tags }}"

    - name: Display non-compliant instances
      ansible.builtin.debug:
        msg:
          instance_id: "{{ item.instance_id }}"
          instance_type: "{{ item.instance_type }}"
          name: "{{ item.name }}"
          missing_tags: "{{ item.missing_tags }}"
      loop: "{{ compliance_results | rejectattr('compliant') | list }}"
      loop_control:
        label: "{{ item.instance_id }}"

    - name: Set stats for workflow artifact passing
      ansible.builtin.set_stats:
        data:
          ec2_compliance_rate: "{{ (compliance_results | selectattr('compliant') | list | length) / (compliance_results | length) * 100 }}"
          ec2_non_compliant_instances: "{{ compliance_results | rejectattr('compliant') | list }}"
