---
- name: Detect Idle EC2 Instances
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    aws_region: "{{ region | default('us-east-1') }}"
    cpu_threshold: "{{ idle_cpu_threshold | default(5) }}"
    days_to_check: "{{ idle_days | default(7) }}"
    network_threshold_bytes: "{{ idle_network_threshold | default(1048576) }}"

  tasks:
    - name: Gather running EC2 instances
      amazon.aws.ec2_instance_info:
        region: "{{ aws_region }}"
        filters:
          instance-state-name: running
      register: ec2_instances

    - name: Get CPU metrics for each instance via boto3
      ansible.builtin.shell:
        cmd: |
          python3 -c "
          import boto3, json
          from datetime import datetime, timedelta, timezone

          cw = boto3.client('cloudwatch', region_name='{{ aws_region }}')
          resp = cw.get_metric_statistics(
              Namespace='AWS/EC2',
              MetricName='CPUUtilization',
              Dimensions=[{'Name': 'InstanceId', 'Value': '{{ item.instance_id }}'}],
              StartTime=datetime.now(timezone.utc) - timedelta(days={{ days_to_check | int }}),
              EndTime=datetime.now(timezone.utc),
              Period=86400,
              Statistics=['Average']
          )
          datapoints = resp.get('Datapoints', [])
          if datapoints:
              avg = sum(d['Average'] for d in datapoints) / len(datapoints)
          else:
              avg = 0.0
          print(json.dumps({'avg_cpu': round(avg, 2), 'datapoints_count': len(datapoints)}))
          "
      loop: "{{ ec2_instances.instances }}"
      loop_control:
        label: "{{ item.instance_id }}"
      register: cpu_metrics
      changed_when: false

    - name: Identify idle instances
      ansible.builtin.set_fact:
        idle_instances: >-
          {{
            idle_instances | default([]) + [{
              'instance_id': item.item.instance_id,
              'instance_type': item.item.instance_type,
              'name': item.item.tags.Name | default('UNTAGGED'),
              'launch_time': item.item.launch_time,
              'avg_cpu': metrics.avg_cpu,
              'is_idle': metrics.avg_cpu < (cpu_threshold | float)
            }]
          }}
      vars:
        metrics: "{{ item.stdout | from_json }}"
      loop: "{{ cpu_metrics.results }}"
      loop_control:
        label: "{{ item.item.instance_id }}"

    - name: Display idle instances
      ansible.builtin.debug:
        msg:
          idle_instances: "{{ idle_instances | selectattr('is_idle') | list }}"
          idle_count: "{{ idle_instances | selectattr('is_idle') | list | length }}"
          total_checked: "{{ idle_instances | length }}"
          threshold: "{{ cpu_threshold }}% average CPU over {{ days_to_check }} days"

    - name: Set stats for workflow artifact passing
      ansible.builtin.set_stats:
        data:
          ec2_idle_instances: "{{ idle_instances | selectattr('is_idle') | list }}"
          ec2_idle_count: "{{ idle_instances | selectattr('is_idle') | list | length }}"
